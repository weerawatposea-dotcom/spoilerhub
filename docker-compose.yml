services:
  db:
    image: postgres:17-alpine
    container_name: spoilerhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spoilerhub
      POSTGRES_PASSWORD: spoilerhub
      POSTGRES_DB: spoilerhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
